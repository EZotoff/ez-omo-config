version: '3.8'
services:
  app:
    build:
      context: ${WORKTREE_PATH}
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT}:3000"
    volumes:
      - ${WORKTREE_PATH}:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WORKTREE_BRANCH=${BRANCH_NAME}
    working_dir: /app
    command: npm run dev
    container_name: wt-${BRANCH_NAME}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
